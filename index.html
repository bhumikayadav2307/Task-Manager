<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy ToDo - Your Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">✨</span>
                    Fancy ToDo
                </h1>
                <button class="theme-toggle" id="themeToggle">
                    <span class="sun">☀️</span>
                    <span class="moon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main App -->
        <main class="main">
            <!-- Add Task Section -->
            <div class="add-task-section">
                <div class="input-group">
                    <input type="text" id="taskInput" placeholder="What needs to be done today? ✨" maxlength="100">
                    <button class="add-btn" id="addBtn">
                        <span>Add Task</span>
                        <div class="plus-icon">+</div>
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalTasks">0</span>
                    <span>Total</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="completedTasks">0</span>
                    <span>Done</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span>Pending</span>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <!-- Tasks List -->
            <ul class="tasks-list" id="tasksList">
                <!-- Tasks will appear here -->
            </ul>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <h3>No tasks yet</h3>
                <p>Add your first task above to get started! ✨</p>
            </div>

            <!-- Clear Completed -->
            <div class="clear-section">
                <button class="clear-btn" id="clearCompleted">Clear Completed</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
